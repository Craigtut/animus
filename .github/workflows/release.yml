name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: 'aarch64-apple-darwin'
            tauri-args: '--target aarch64-apple-darwin'
            target-arch: ''
          - platform: macos-latest
            rust-targets: 'x86_64-apple-darwin'
            tauri-args: '--target x86_64-apple-darwin'
            target-arch: 'x64'
          - platform: windows-latest
            rust-targets: ''
            tauri-args: ''
            target-arch: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/tauri/target
          key: cargo-${{ matrix.platform }}-${{ matrix.rust-targets || 'default' }}-${{ hashFiles('packages/tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.platform }}-${{ matrix.rust-targets || 'default' }}-

      - name: Install dependencies
        run: npm install

      - name: Build production assets
        run: npm run build:prod

      - name: Import Apple certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Prepare Tauri sidecar
        run: npm run prepare:tauri
        env:
          TAURI_TARGET_ARCH: ${{ matrix.target-arch }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          # Extract the section for the current version from CHANGELOG.md
          # Grabs everything between the first ## header and the next ## header (or EOF)
          NOTES=$(awk '/^## /{if(found) exit; found=1; next} found{print}' CHANGELOG.md)
          # Use GitHub Actions delimiter for multiline output
          echo "notes<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app and create release
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: packages/tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Animus ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.notes }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}

  # Replace versioned installer names with stable names for /latest/download/ URLs
  rename-installers:
    needs: build-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Replace versioned assets with non-versioned names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"

          declare -A FILES
          FILES["Animus_${VERSION}_aarch64.dmg"]="Animus_aarch64.dmg"
          FILES["Animus_${VERSION}_x64.dmg"]="Animus_x64.dmg"
          FILES["Animus_${VERSION}_x64-setup.exe"]="Animus_x64-setup.exe"

          for VERSIONED in "${!FILES[@]}"; do
            STABLE="${FILES[$VERSIONED]}"
            echo "Downloading $VERSIONED..."
            gh release download "$TAG" --repo "$REPO" --pattern "$VERSIONED" --dir /tmp/assets || {
              echo "Warning: $VERSIONED not found, skipping"
              continue
            }

            echo "Uploading as $STABLE..."
            cp "/tmp/assets/$VERSIONED" "/tmp/assets/$STABLE"
            gh release upload "$TAG" "/tmp/assets/$STABLE" --repo "$REPO"

            echo "Removing versioned asset $VERSIONED..."
            gh release delete-asset "$TAG" "$VERSIONED" --repo "$REPO" --yes
          done

  # Tauri hardcodes the version into installer filenames — rename to stable names
  # so /releases/latest/download/ URLs work without knowing the version
  rename-installers:
    needs: build-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Replace versioned assets with non-versioned names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"

          declare -A FILES
          FILES["Animus_${VERSION}_aarch64.dmg"]="Animus_aarch64.dmg"
          FILES["Animus_${VERSION}_x64.dmg"]="Animus_x64.dmg"
          FILES["Animus_${VERSION}_x64-setup.exe"]="Animus_x64-setup.exe"

          for VERSIONED in "${!FILES[@]}"; do
            STABLE="${FILES[$VERSIONED]}"
            echo "Downloading $VERSIONED..."
            gh release download "$TAG" --repo "$REPO" --pattern "$VERSIONED" --dir /tmp/assets || {
              echo "Warning: $VERSIONED not found, skipping"
              continue
            }

            echo "Uploading as $STABLE..."
            cp "/tmp/assets/$VERSIONED" "/tmp/assets/$STABLE"
            gh release upload "$TAG" "/tmp/assets/$STABLE" --repo "$REPO"

            echo "Removing versioned asset $VERSIONED..."
            gh release delete-asset "$TAG" "$VERSIONED" --repo "$REPO" --yes
          done

  build-docker:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
