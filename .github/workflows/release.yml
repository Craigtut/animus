name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: 'aarch64-apple-darwin'
            tauri-args: '--target aarch64-apple-darwin'
            target-arch: ''
          - platform: macos-latest
            rust-targets: 'x86_64-apple-darwin'
            tauri-args: '--target x86_64-apple-darwin'
            target-arch: 'x64'
          - platform: windows-latest
            rust-targets: ''
            tauri-args: ''
            target-arch: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/tauri/target
          key: cargo-${{ matrix.platform }}-${{ matrix.rust-targets || 'default' }}-${{ hashFiles('packages/tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.platform }}-${{ matrix.rust-targets || 'default' }}-

      - name: Install dependencies
        run: npm install

      - name: Build production assets
        run: npm run build:prod

      - name: Import Apple certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Prepare Tauri sidecar
        run: npm run prepare:tauri
        env:
          TAURI_TARGET_ARCH: ${{ matrix.target-arch }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          # Extract the section for the current version from CHANGELOG.md
          # Grabs everything between the first ## header and the next ## header (or EOF)
          NOTES=$(awk '/^## /{if(found) exit; found=1; next} found{print}' CHANGELOG.md)
          # Use GitHub Actions delimiter for multiline output
          echo "notes<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app and create release
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        with:
          projectPath: packages/tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Animus ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.notes }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}

      - name: Upload stable-named download assets
        if: steps.tauri.outputs.artifactPaths != '[]'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_JSON: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          # Parse artifact paths from JSON array via env var to avoid backslash mangling on Windows
          echo "$ARTIFACT_JSON" | jq -r '.[]' | while IFS= read -r ARTIFACT; do
            [ -z "$ARTIFACT" ] && continue
            BASENAME=$(basename "$ARTIFACT")
            # Strip version from filename: Animus_0.2.1_aarch64.dmg -> Animus_aarch64.dmg
            STABLE_NAME=$(echo "$BASENAME" | sed "s/_${VERSION}//; s/_${VERSION}//")
            if [ "$STABLE_NAME" != "$BASENAME" ]; then
              cp "$ARTIFACT" "$(dirname "$ARTIFACT")/$STABLE_NAME"
              gh release upload "$TAG" "$(dirname "$ARTIFACT")/$STABLE_NAME" --clobber
            fi
          done
